name: CI

on:
  push:
  pull_request:

jobs:
  test-lib:
    name: "test-lib (elixir ${{ matrix.elixir }} / otp ${{ matrix.otp }} / node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.18", "1.19"]
        otp: ["26", "27", "28"]
        node: ["20", "22", "24"]
        exclude:
          - elixir: "1.18"
            otp: "28"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: priv/package-lock.json

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-e${{ matrix.elixir }}-o${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-e${{ matrix.elixir }}-o${{ matrix.otp }}-

      - name: Build Node bundle
        working-directory: priv
        run: |
          npm ci
          npm run bundle

      - run: mix deps.get
      - run: mix test

  test-example:
    name: "test-example (elixir ${{ matrix.elixir }} / otp ${{ matrix.otp }} / node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.18", "1.19"]
        otp: ["27", "28"]
        node: ["22", "24"]
        exclude:
          - elixir: "1.18"
            otp: "28"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: priv/package-lock.json

      - name: Cache example Mix deps
        uses: actions/cache@v4
        with:
          path: |
            examples/hello/deps
            examples/hello/_build
          key: mix-example-${{ runner.os }}-e${{ matrix.elixir }}-o${{ matrix.otp }}-${{ hashFiles('examples/hello/mix.lock') }}
          restore-keys: mix-example-${{ runner.os }}-e${{ matrix.elixir }}-o${{ matrix.otp }}-

      - name: Build Node bundle
        working-directory: priv
        run: |
          npm ci
          npm run bundle

      - run: mix deps.get

      - name: Run example tests
        working-directory: examples/hello
        run: |
          mix deps.get
          mix test
