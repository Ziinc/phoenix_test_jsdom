name: CI

on:
  push:
  pull_request:

jobs:
  test-lib:
    name: Test library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: priv/package-lock.json

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Build Node bundle
        working-directory: priv
        run: |
          npm ci
          npm run bundle

      - run: mix deps.get
      - run: mix test

  test-example:
    name: Test example app
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: priv/package-lock.json

      - name: Cache example Mix deps
        uses: actions/cache@v4
        with:
          path: |
            examples/hello/deps
            examples/hello/_build
          key: mix-example-${{ runner.os }}-${{ hashFiles('examples/hello/mix.lock') }}
          restore-keys: mix-example-${{ runner.os }}-

      - name: Build Node bundle
        working-directory: priv
        run: |
          npm ci
          npm run bundle

      - run: mix deps.get

      - name: Run example tests
        working-directory: examples/hello
        run: |
          mix deps.get
          mix test
